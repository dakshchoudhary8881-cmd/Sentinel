<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A33"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield outline (Sentinel = guard/protector concept) -->
  <path d="M 200 40
           L 320 85
           L 320 200
           C 320 290, 270 340, 200 370
           C 130 340, 80 290, 80 200
           L 80 85
           Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="10" stroke-linejoin="round"/>

  <!-- Inner pulse / radar rings (detection concept) -->
  <circle cx="200" cy="195" r="38" fill="none" stroke="#FF4500" stroke-width="4" opacity="0.9"/>
  <circle cx="200" cy="195" r="60" fill="none" stroke="#FF4500" stroke-width="2.5" opacity="0.5"/>
  <circle cx="200" cy="195" r="82" fill="none" stroke="#FF4500" stroke-width="1.5" opacity="0.25"/>

  <!-- Center dot -->
  <circle cx="200" cy="195" r="12" fill="url(#shieldGrad)" filter="url(#softGlow)"/>

  <!-- Small heartbeat pulse line through center (biometric detection nod) -->
  <path d="M 140 195 L 168 195 L 178 170 L 192 220 L 208 195 L 260 195"
        fill="none" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
